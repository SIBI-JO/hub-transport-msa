server:
  port: 19096

spring:
  cloud:
    config:
      enabled: false
  config:
    import:
      - optional:file:./product/.env[.properties]
  application:
    name: product-service  # Eureka에 등록될 서비스 이름
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/
    register-with-eureka: true   # 클라이언트가 Eureka에 자기 자신을 등록
    fetch-registry: true         # 다른 서비스 정보(Eureka 레지스트리)도 가져옴

company:
  service:
    url: http://company-service

jwt:
  secret:
    key: ${JWT_SECRET_KEY}