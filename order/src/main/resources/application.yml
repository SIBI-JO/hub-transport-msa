spring:
  application:
    name: order-service

server:
  port: 19093

# Eureka Server
eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/

# Zipkin
management:
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"
  tracing:
    sampling:
      probability: 1.0