version: '3.8'

services:
  eureka:
    build:
      context: ./eureka
    container_name: eureka
    ports:
      - "19090:19090"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - msa-network

  gateway:
    build:
      context: ./gateway
    container_name: gateway
    ports:
      - "19091:19091"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:19090/eureka
      - SPRING_PROFILES_ACTIVE=docker
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - eureka
    networks:
      - msa-network

  user:
    build:
      context: ./user
    container_name: user
    ports:
      - "19092:19092"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:19090/eureka
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hub_transport
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_DATABASE_PLATFORM=${SPRING_DATASOURCE_PLATFORM}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
    depends_on:
      - eureka
      - postgres
      - zipkin
    networks:
      - msa-network

  order:
    build:
      context: ./order
    container_name: order
    ports:
      - "19093:19093"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:19090/eureka
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hub_transport
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_DATABASE_PLATFORM=${SPRING_DATASOURCE_PLATFORM}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - eureka
      - postgres
      - zipkin
    networks:
      - msa-network

  delivery:
    build:
      context: ./delivery
    container_name: delivery
    ports:
      - "19094:19094"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:19090/eureka
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hub_transport
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_DATABASE_PLATFORM=${SPRING_DATASOURCE_PLATFORM}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - eureka
      - postgres
      - zipkin
    networks:
      - msa-network

  company:
    build:
      context: ./company
    container_name: company
    ports:
      - "19095:19095"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:19090/eureka
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hub_transport
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - eureka
      - postgres
      - zipkin
    networks:
      - msa-network

  product:
    build:
      context: ./product
    container_name: product
    ports:
      - "19096:19096"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:19090/eureka
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hub_transport
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - eureka
      - postgres
      - zipkin
    networks:
      - msa-network

  hub:
    build:
      context: ./hub
    container_name: hub
    ports:
      - "19097:19097"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:19090/eureka
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hub_transport
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_DATABASE_PLATFORM=${SPRING_DATASOURCE_PLATFORM}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - KAKAO_MAP_KEY = ${KAKAO_MAP_KEY}
    depends_on:
      - eureka
      - postgres
      - zipkin
    networks:
      - msa-network

  ai:
    build:
      context: ./ai
    container_name: ai
    ports:
      - "19098:19098"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:19090/eureka
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hub_transport
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - eureka
      - postgres
      - zipkin
    networks:
      - msa-network

  hub-routes:
    build:
      context: ./hub-routes
    container_name: hub-routes
    ports:
      - "19099:19099"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:19090/eureka
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:jdbc:postgresql://postgres:5432/hub_transport
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_DATABASE_PLATFORM=${SPRING_DATASOURCE_PLATFORM}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - KAKAO_MAP_KEY = ${KAKAO_MAP_KEY}
    depends_on:
      - eureka
      - postgres
      - zipkin
    networks:
      - msa-network

  postgres:
    image: postgres:16.2
    container_name: postgres
    environment:
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      POSTGRES_DB: hub_transport
    ports:
      - "5433:5432"
    networks:
      - msa-network
    volumes:
      - pgdata:/var/lib/postgresql/data

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - msa-network

networks:
  msa-network:
    driver: bridge

volumes:
  pgdata:
